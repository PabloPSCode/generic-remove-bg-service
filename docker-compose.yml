version: '3.8'

services:
  remove-bg-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remove-bg-service
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - BG_VERIFY_TOKEN=${BG_VERIFY_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
